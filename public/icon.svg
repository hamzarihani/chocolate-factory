<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #3D2317; }
      .bar { fill: #5D3728; }
      .accent { fill: #8B5A2B; }
      .gold { fill: #D4AF37; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1A0F0A; }
      .bar { fill: #3D2317; }
      .accent { fill: #5D3728; }
      .gold { fill: #FFD700; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="40" />
  
  <!-- Chocolate Bar Body -->
  <rect x="40" y="30" width="100" height="120" rx="8" class="bar" />
  
  <!-- Grid of Segments -->
  <!-- Top Left -->
  <rect x="45" y="35" width="42.5" height="35" rx="4" class="accent" />
  <rect x="48" y="38" width="36.5" height="29" rx="2" class="bar" style="opacity: 0.5" />
  
  <!-- Top Right -->
  <rect x="92.5" y="35" width="42.5" height="35" rx="4" class="accent" />
  <rect x="95.5" y="38" width="36.5" height="29" rx="2" class="bar" style="opacity: 0.5" />
  
  <!-- Middle Left -->
  <rect x="45" y="75" width="42.5" height="35" rx="4" class="accent" />
  <rect x="48" y="78" width="36.5" height="29" rx="2" class="bar" style="opacity: 0.5" />
  
  <!-- Middle Right -->
  <rect x="92.5" y="75" width="42.5" height="35" rx="4" class="accent" />
  <rect x="95.5" y="78" width="36.5" height="29" rx="2" class="bar" style="opacity: 0.5" />
  
  <!-- Bottom Left -->
  <rect x="45" y="115" width="42.5" height="25" rx="4" class="accent" />
  <rect x="48" y="118" width="36.5" height="19" rx="2" class="bar" style="opacity: 0.5" />
  
  <!-- Bottom Right -->
  <rect x="92.5" y="115" width="42.5" height="25" rx="4" class="accent" />
  <rect x="95.5" y="118" width="36.5" height="19" rx="2" class="bar" style="opacity: 0.5" />

  <!-- Gold Wrapper Detail -->
  <path d="M35 120 L145 120 L145 155 Q145 160 140 160 L40 160 Q35 160 35 155 Z" class="gold" style="opacity: 0.8" />
  <path d="M35 120 L145 120 L90 140 Z" class="gold" />
</svg>